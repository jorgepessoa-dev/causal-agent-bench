name: leaderboard

# F2.4: one invocation, one combined ranked artifact. Runs all baselines
# over the repo's fixture and uploads a single leaderboard.json. Once real
# RouterBench data lands (F2.2), the --source arg swaps from the tiny
# fixture to the full seed file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  leaderboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run all baselines (combined leaderboard)
        run: |
          python -m causal_agent_bench.leaderboard_cli \
            --source tests/fixtures/synthetic_router_decisions.jsonl \
            --seed 0 \
            --output leaderboard.json

      - name: Display ranking
        run: |
          echo "### Leaderboard (commit ${GITHUB_SHA:0:7})"
          cat leaderboard.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-${{ github.sha }}
          path: leaderboard.json
          retention-days: 30
