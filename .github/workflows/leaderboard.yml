name: leaderboard

# F2.4 scaffold: on every push to main and every PR, run each baseline
# router over the repo's fixture and upload the JSON reports as build
# artifacts. Once real RouterBench data lands (F2.2 dedicated session),
# the --source arg swaps from the tiny fixture to the full seed file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  baselines:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        router: [random, heuristic]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Evaluate baseline (${{ matrix.router }})
        run: |
          python -m causal_agent_bench.cli \
            --source tests/fixtures/synthetic_router_decisions.jsonl \
            --router ${{ matrix.router }} \
            --seed 0 \
            --output report-${{ matrix.router }}.json

      - name: Display report
        run: |
          echo "### Baseline: ${{ matrix.router }} (commit ${GITHUB_SHA:0:7})"
          cat report-${{ matrix.router }}.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-${{ matrix.router }}-${{ github.sha }}
          path: report-${{ matrix.router }}.json
          retention-days: 30
